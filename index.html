<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Střílej šneky!</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #fff; overflow: hidden; }
canvas { border: 2px solid #444; border-radius: 8px; display: block; cursor: none; touch-action: none; max-width: 100vw; max-height: 100vh; }
#ui { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 24px; font-size: 16px; font-weight: 500; pointer-events: none; white-space: nowrap; }
#overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.78); border-radius: 8px; }
#overlay h1 { font-size: 32px; margin-bottom: 10px; }
#overlay p { font-size: 14px; color: #aaa; margin-bottom: 20px; text-align: center; line-height: 1.8; padding: 0 16px; }
#overlay button { padding: 12px 32px; font-size: 18px; background: #e25822; border: none; border-radius: 8px; color: #fff; cursor: pointer; font-weight: 600; }
.joy {
  position: absolute; bottom: 20px;
  width: 110px; height: 110px; border-radius: 50%;
  background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.2);
  display: none; touch-action: none;
}
#joyL { left: 20px; }
#joyR { right: 20px; }
.stick {
  position: absolute; width: 48px; height: 48px; border-radius: 50%;
  background: rgba(255,255,255,0.32); top: 31px; left: 31px; pointer-events: none;
}
.wrap { position: relative; }
</style>
</head>
<body>
<div class="wrap">
<canvas id="c" width="680" height="500"></canvas>
<div id="ui">
  <span>❤️ <span id="lives">3</span></span>
  <span>Skóre: <span id="score">0</span></span>
  <span id="weaponLabel">Pistole</span>
</div>
<div class="joy" id="joyL"><div class="stick" id="stickL"></div></div>
<div class="joy" id="joyR"><div class="stick" id="stickR"></div></div>
<div id="overlay">
  <h1>🐌 Střílej šneky!</h1>
  <p>PC: W A S D + levé tlačítko myši<br>Mobil: levý joystick = pohyb, pravý = míření a střelba<br>Zabij bosse a získej novou zbraň!</p>
  <button id="startBtn">Hrát</button>
</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const overlay = document.getElementById('overlay');
const livesEl = document.getElementById('lives');
const scoreEl = document.getElementById('score');
const weaponLabel = document.getElementById('weaponLabel');
const joyLEl = document.getElementById('joyL');
const joyREl = document.getElementById('joyR');
const stickLEl = document.getElementById('stickL');
const stickREl = document.getElementById('stickR');

const WEAPONS = [
  { name:'Pistole',    ammo:10, reload:120, cool:20, spread:0,   count:1, spd:11, color:'#ffe033', r:5 },
  { name:'Brokovnice', ammo:6,  reload:150, cool:30, spread:0.7, count:5, spd:10, color:'#ffaa33', r:4 },
  { name:'Samopal',    ammo:25, reload:90,  cool:6,  spread:0.1, count:1, spd:13, color:'#33ffee', r:4, auto:true, dmg:0.3 },
  { name:'Laser',      ammo:15, reload:100, cool:12, spread:0,   count:1, spd:18, color:'#ff33ff', r:3, laser:true },
  { name:'Raketomet',  ammo:4,  reload:180, cool:40, spread:0,   count:1, spd:7,  color:'#ff6633', r:9, explode:true },
];

const JR = 55, SR = 24;

// Left joystick (movement)
let lActive=false, lDx=0, lDy=0, lId=null;
// Right joystick (aim + shoot)
let rActive=false, rDx=0, rDy=0, rId=null, rShooting=false;

const isMobile = () => navigator.maxTouchPoints > 0;

function setupJoy(el, stickEl, onMove, onEnd) {
  el.addEventListener('touchstart', e => {
    e.preventDefault();
    let t = e.changedTouches[0];
    onMove(t, el, stickEl, true);
  }, {passive:false});
  el.addEventListener('touchmove', e => {
    e.preventDefault();
    for (let t of e.changedTouches) onMove(t, el, stickEl, false);
  }, {passive:false});
  el.addEventListener('touchend', e => {
    e.preventDefault();
    stickEl.style.left = (JR-SR)+'px';
    stickEl.style.top  = (JR-SR)+'px';
    onEnd();
  }, {passive:false});
  el.addEventListener('touchcancel', e => {
    stickEl.style.left = (JR-SR)+'px';
    stickEl.style.top  = (JR-SR)+'px';
    onEnd();
  });
}

function moveStick(t, el, stickEl) {
  let rect = el.getBoundingClientRect();
  let dx = t.clientX - (rect.left + JR);
  let dy = t.clientY - (rect.top  + JR);
  let d  = Math.hypot(dx, dy);
  if (d > JR) { dx=dx/d*JR; dy=dy/d*JR; }
  stickEl.style.left = (JR-SR+dx)+'px';
  stickEl.style.top  = (JR-SR+dy)+'px';
  return {dx: dx/JR, dy: dy/JR};
}

setupJoy(joyLEl, stickLEl,
  (t, el, stickEl, start) => {
    if (start) lId = t.identifier;
    if (t.identifier !== lId) return;
    lActive = true;
    let v = moveStick(t, el, stickEl);
    lDx = v.dx; lDy = v.dy;
  },
  () => { lActive=false; lDx=0; lDy=0; }
);

setupJoy(joyREl, stickREl,
  (t, el, stickEl, start) => {
    if (start) rId = t.identifier;
    if (t.identifier !== rId) return;
    let v = moveStick(t, el, stickEl);
    let mag = Math.hypot(v.dx, v.dy);
    if (mag > 0.15) {
      rActive = true; rDx = v.dx; rDy = v.dy;
      rShooting = true;
      if (start) shootOnce = true;
    } else {
      rActive = false; rDx = 0; rDy = 0; rShooting = false;
    }
  },
  () => { rActive=false; rDx=0; rDy=0; rShooting=false; }
);

let player, snails, boss, bullets, bossProj, particles, slime, drops, keys, mouse,
    shootOnce, mouseHeld, score, lives, gameRunning, animId,
    shootCooldown, ammo, reloading, reloadTimer, weaponIdx,
    spawnTimer, bossTimer, nextBossIn, mobile;

function getW() { return WEAPONS[weaponIdx]; }

function showMobile() {
  mobile = true;
  joyLEl.style.display = 'block';
  joyREl.style.display = 'block';
}

function init() {
  player={x:W/2,y:H/2,r:16,speed:3,angle:0};
  snails=[];boss=null;bullets=[];bossProj=[];particles=[];slime=[];drops=[];
  keys={};mouse={x:W/2,y:H/2};shootOnce=false;mouseHeld=false;
  score=0;lives=3;weaponIdx=0;mobile=false;
  ammo=getW().ammo;reloading=false;reloadTimer=0;shootCooldown=0;
  spawnTimer=0;bossTimer=0;nextBossIn=1800;
  gameRunning=true;
  livesEl.textContent=lives;scoreEl.textContent=score;weaponLabel.textContent=getW().name;
  overlay.style.display='none';
  if (isMobile()) showMobile();
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function edge() {
  let s=Math.floor(Math.random()*4),x,y;
  if(s===0){x=Math.random()*W;y=-60;}
  else if(s===1){x=W+60;y=Math.random()*H;}
  else if(s===2){x=Math.random()*W;y=H+60;}
  else{x=-60;y=Math.random()*H;}
  return{x,y};
}

function spawnSnail() {
  let{x,y}=edge();
  let diff=Math.min(Math.floor(score/300),5);
  let roll=Math.random(),r,speed,maxHp,pts,color;
  if(roll<0.4){r=11;speed=1.1+diff*0.09;maxHp=1;pts=5;color='#e8c870';}
  else if(roll<0.8){r=14;speed=0.92+diff*0.075;maxHp=2+diff;pts=10;color='#c8a055';}
  else{r=17;speed=0.76+diff*0.06;maxHp=5+diff*2;pts=25;color='#9a7830';}
  snails.push({x,y,r,speed,hp:maxHp,maxHp,pts,color,slimeTimer:0,angle:0});
}

function spawnBoss() {
  if(boss)return;
  let{x,y}=edge();
  let diff=Math.min(Math.floor(score/500),8);
  let hp=30+diff*15;
  boss={x,y,r:44,speed:0.85+diff*0.07,hp,maxHp:hp,angle:0,flashTimer:0,shootTimer:90};
  bossTimer=0;
}

function prt(x,y,color,n=8) {
  for(let i=0;i<n;i++){
    let a=Math.random()*Math.PI*2,spd=1.5+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,color});
  }
}

function explode(x,y) {
  prt(x,y,'#ff6633',16);prt(x,y,'#ffaa33',12);
  for(let s of snails)if(Math.hypot(s.x-x,s.y-y)<80){s.hp-=3;if(s.hp<=0){s.dead=true;score+=s.pts;scoreEl.textContent=score;}}
  if(boss&&Math.hypot(boss.x-x,boss.y-y)<100){boss.hp-=8;boss.flashTimer=10;}
}

function fire() {
  let w=getW(),a=player.angle;
  for(let i=0;i<w.count;i++){
    let sa=a+(Math.random()-0.5)*w.spread;
    bullets.push({x:player.x+Math.cos(sa)*20,y:player.y+Math.sin(sa)*20,
      vx:Math.cos(sa)*w.spd,vy:Math.sin(sa)*w.spd,
      r:w.r,color:w.color,laser:!!w.laser,explode:!!w.explode,dmg:w.dmg||1});
  }
  ammo--;
  if(ammo<=0){reloading=true;reloadTimer=w.reload;}
}

function separate() {
  for(let i=0;i<snails.length;i++)for(let j=i+1;j<snails.length;j++){
    let a=snails[i],b=snails[j],dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy),m=a.r+b.r;
    if(d<m&&d>0){let p=(m-d)/2,nx=dx/d,ny=dy/d;a.x-=nx*p;a.y-=ny*p;b.x+=nx*p;b.y+=ny*p;}
  }
}

function loop() { if(!gameRunning)return; update();draw(); animId=requestAnimationFrame(loop); }

function update() {
  // movement
  let dx=0,dy=0;
  if(keys['w']||keys['W']||keys['ArrowUp'])dy-=1;
  if(keys['s']||keys['S']||keys['ArrowDown'])dy+=1;
  if(keys['a']||keys['A']||keys['ArrowLeft'])dx-=1;
  if(keys['d']||keys['D']||keys['ArrowRight'])dx+=1;
  if(lActive){dx+=lDx;dy+=lDy;}
  if(dx||dy){let l=Math.hypot(dx,dy);dx/=l;dy/=l;}
  player.x=Math.max(player.r,Math.min(W-player.r,player.x+dx*player.speed));
  player.y=Math.max(player.r,Math.min(H-player.r,player.y+dy*player.speed));

  // aim: right joystick on mobile, mouse on PC
  if(rActive&&(rDx||rDy)){
    player.angle=Math.atan2(rDy,rDx);
    mouse.x=player.x+Math.cos(player.angle)*200;
    mouse.y=player.y+Math.sin(player.angle)*200;
  } else {
    player.angle=Math.atan2(mouse.y-player.y,mouse.x-player.x);
  }

  // reload
  if(reloading){reloadTimer--;if(reloadTimer<=0){reloading=false;ammo=getW().ammo;}}

  // shoot
  let w=getW();
  if(shootCooldown>0)shootCooldown--;
  let want = w.auto ? (mouseHeld||rShooting) : shootOnce;
  if(want&&!reloading&&shootCooldown<=0&&ammo>0){fire();shootCooldown=w.cool;shootOnce=false;}
  else if(shootOnce) shootOnce=false;

  // spawn snails (only when no boss)
  if(!boss){
    spawnTimer++;
    let iv=Math.max(40,120-Math.floor(score/100)*5);
    if(spawnTimer>=iv){spawnSnail();spawnTimer=0;}
    bossTimer++;
    if(bossTimer>=nextBossIn){spawnBoss();}
  }

  // move bullets
  bullets=bullets.filter(b=>{
    b.x+=b.vx;b.y+=b.vy;
    if(b.explode&&(b.x<0||b.x>W||b.y<0||b.y>H)){explode(b.x,b.y);return false;}
    return b.x>-30&&b.x<W+30&&b.y>-30&&b.y<H+30;
  });

  // boss
  if(boss){
    let a=Math.atan2(player.y-boss.y,player.x-boss.x);
    boss.angle=a;boss.x+=Math.cos(a)*boss.speed;boss.y+=Math.sin(a)*boss.speed;
    if(boss.flashTimer>0)boss.flashTimer--;
    boss.shootTimer--;
    if(boss.shootTimer<=0){
      let sa=Math.atan2(player.y-boss.y,player.x-boss.x);
      bossProj.push({x:boss.x,y:boss.y,vx:Math.cos(sa)*4.5,vy:Math.sin(sa)*4.5,angle:sa,r:7});
      boss.shootTimer=70;
    }
    for(let b of bullets){
      if(b.dead)continue;
      if(Math.hypot(b.x-boss.x,b.y-boss.y)<b.r+boss.r){
        if(b.explode){explode(b.x,b.y);b.dead=true;}
        else{boss.hp-=b.dmg;b.dead=true;boss.flashTimer=6;prt(b.x,b.y,b.color,5);}
        if(boss.hp<=0){
          prt(boss.x,boss.y,'#ff4400',20);prt(boss.x,boss.y,'#ffaa00',20);
          score+=300;scoreEl.textContent=score;
          let choices=WEAPONS.filter((_,i)=>i!==weaponIdx);
          drops.push({x:boss.x,y:boss.y,weapon:choices[Math.floor(Math.random()*choices.length)],life:600,r:18});
          boss=null;break;
        }
      }
    }
    if(boss&&Math.hypot(boss.x-player.x,boss.y-player.y)<boss.r+player.r){
      lives--;livesEl.textContent=lives;prt(player.x,player.y,'#ff4444',12);
      if(lives<=0){gameOver();return;}
      let ang=Math.atan2(player.y-boss.y,player.x-boss.x);
      player.x=Math.max(player.r,Math.min(W-player.r,player.x+Math.cos(ang)*40));
      player.y=Math.max(player.r,Math.min(H-player.r,player.y+Math.sin(ang)*40));
    }
  }
  bullets=bullets.filter(b=>!b.dead);

  // boss projectiles
  bossProj=bossProj.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(Math.hypot(p.x-player.x,p.y-player.y)<p.r+player.r){
      lives--;livesEl.textContent=lives;prt(p.x,p.y,'#ff6600',6);
      if(lives<=0){gameOver();return false;}
      return false;
    }
    return p.x>-30&&p.x<W+30&&p.y>-30&&p.y<H+30;
  });

  // snails
  for(let s of snails){
    let a=Math.atan2(player.y-s.y,player.x-s.x);s.angle=a;
    s.x+=Math.cos(a)*s.speed;s.y+=Math.sin(a)*s.speed;
    s.slimeTimer--;
    if(s.slimeTimer<=0){slime.push({x:s.x,y:s.y,r:s.r*0.5+Math.random()*3,life:1});s.slimeTimer=8;}
  }
  separate();

  for(let b of bullets)for(let s of snails){
    if(!s.dead&&Math.hypot(b.x-s.x,b.y-s.y)<b.r+s.r){
      if(b.explode){explode(b.x,b.y);b.dead=true;}
      else{s.hp-=b.dmg;b.dead=true;prt(b.x,b.y,b.color,4);}
      if(s.hp<=0){prt(s.x,s.y,'#e25822',6);s.dead=true;score+=s.pts;scoreEl.textContent=score;}
      break;
    }
  }
  bullets=bullets.filter(b=>!b.dead);
  snails=snails.filter(s=>!s.dead);

  for(let s of snails){
    if(Math.hypot(s.x-player.x,s.y-player.y)<s.r+player.r){
      lives--;livesEl.textContent=lives;prt(player.x,player.y,'#ff4444');s.dead=true;
      if(lives<=0){gameOver();return;}
    }
  }
  snails=snails.filter(s=>!s.dead);

  drops=drops.filter(d=>{
    d.life--;
    if(Math.hypot(d.x-player.x,d.y-player.y)<d.r+player.r){
      weaponIdx=WEAPONS.indexOf(d.weapon);
      ammo=d.weapon.ammo;reloading=false;reloadTimer=0;shootCooldown=0;
      weaponLabel.textContent=d.weapon.name;
      particles.push({x:W/2,y:H/2-40,vx:0,vy:0,life:1.5,color:'#fff',text:'Nová zbraň: '+d.weapon.name,textParticle:true});
      return false;
    }
    return d.life>0;
  });

  slime=slime.filter(sl=>{sl.life-=0.018;return sl.life>0;});
  for(let p of particles){p.x+=p.vx;p.y+=p.vy;p.vx*=0.88;p.vy*=0.88;p.life-=p.textParticle?0.008:0.045;}
  particles=particles.filter(p=>p.life>0);
}

function drawLaser() {
  // laser sight: from player forward, fading out over half screen length
  let len = Math.min(W, H) * 0.5;
  let ax = player.x, ay = player.y;
  let ex = ax + Math.cos(player.angle)*len;
  let ey = ay + Math.sin(player.angle)*len;
  let grad = ctx.createLinearGradient(ax,ay,ex,ey);
  grad.addColorStop(0,   'rgba(255,50,50,0.55)');
  grad.addColorStop(0.5, 'rgba(255,50,50,0.18)');
  grad.addColorStop(1,   'rgba(255,50,50,0)');
  ctx.save();
  ctx.strokeStyle=grad;ctx.lineWidth=1.5;
  ctx.setLineDash([6,5]);
  ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ex,ey);ctx.stroke();
  ctx.setLineDash([]);
  // small dot at start
  ctx.beginPath();ctx.arc(ax+Math.cos(player.angle)*player.r,ay+Math.sin(player.angle)*player.r,3,0,Math.PI*2);
  ctx.fillStyle='rgba(255,80,80,0.8)';ctx.fill();
  ctx.restore();
}

function drawSnail(x,y,r,hp,maxHp,angle,bodyColor) {
  let fl=Math.cos(angle)<0;
  ctx.save();
  ctx.translate(x,y);ctx.scale(r/15,r/15);if(fl)ctx.scale(-1,1);
  ctx.beginPath();ctx.ellipse(0,2,14,7,0,0,Math.PI*2);ctx.fillStyle=bodyColor;ctx.fill();ctx.strokeStyle='#7a5020';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.ellipse(2,7,13,3,0,0,Math.PI*2);ctx.fillStyle='#e8c07a';ctx.fill();
  ctx.beginPath();ctx.arc(-2,-4,11,0,Math.PI*2);ctx.fillStyle='#8B3A0F';ctx.fill();ctx.strokeStyle='#5a2008';ctx.lineWidth=1;ctx.stroke();
  for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(-2,-4,3+i*3,-0.6,Math.PI*(1.2-i*0.1));ctx.strokeStyle=`rgba(200,120,60,${0.65-i*0.15})`;ctx.lineWidth=1;ctx.stroke();}
  ctx.beginPath();ctx.arc(12,0,6,0,Math.PI*2);ctx.fillStyle=bodyColor;ctx.fill();ctx.strokeStyle='#7a5020';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.moveTo(13,-5);ctx.lineTo(13,-13);ctx.strokeStyle='#7a5020';ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.arc(13,-14,3,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.beginPath();ctx.arc(14,-14,1.5,0,Math.PI*2);ctx.fillStyle='#111';ctx.fill();
  ctx.restore();
  if(maxHp>1){let bw=r*2.4;ctx.fillStyle='#333';ctx.fillRect(x-bw/2,y-r-8,bw,4);ctx.fillStyle='#4caf50';ctx.fillRect(x-bw/2,y-r-8,bw*(hp/maxHp),4);}
}

function drawBoss(b) {
  let fl=Math.cos(b.angle)<0,flash=b.flashTimer>0;
  ctx.save();ctx.translate(b.x,b.y);if(fl)ctx.scale(-1,1);
  let s=b.r/36;
  ctx.beginPath();ctx.ellipse(0,4*s,30*s,22*s,0,0,Math.PI*2);ctx.fillStyle=flash?'#ff6666':'#c8a87a';ctx.fill();ctx.strokeStyle='#8a6a3a';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.ellipse(-8*s,0,10*s,8*s,0.3,0,Math.PI*2);ctx.fillStyle=flash?'#ff8888':'#b07040';ctx.fill();
  ctx.beginPath();ctx.ellipse(8*s,6*s,8*s,6*s,-0.2,0,Math.PI*2);ctx.fillStyle=flash?'#ff8888':'#e0c090';ctx.fill();
  ctx.beginPath();ctx.ellipse(26*s,0,18*s,15*s,0,0,Math.PI*2);ctx.fillStyle=flash?'#ff6666':'#c8a87a';ctx.fill();ctx.strokeStyle='#8a6a3a';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.ellipse(22*s,-16*s,7*s,10*s,-0.3,0,Math.PI*2);ctx.fillStyle=flash?'#ff9999':'#d4a0a0';ctx.fill();ctx.strokeStyle='#8a6a3a';ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.ellipse(22*s,-16*s,4*s,6*s,-0.3,0,Math.PI*2);ctx.fillStyle='#e8c0c0';ctx.fill();
  ctx.beginPath();ctx.arc(30*s,-5*s,5*s,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.beginPath();ctx.arc(31*s,-5*s,3*s,0,Math.PI*2);ctx.fillStyle='#442288';ctx.fill();
  ctx.beginPath();ctx.arc(32*s,-5*s,1.5*s,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();
  ctx.beginPath();ctx.moveTo(26*s,-11*s);ctx.quadraticCurveTo(30*s,-13*s,35*s,-11*s);ctx.strokeStyle='#7a5a2a';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(38*s,0,3*s,0,Math.PI*2);ctx.fillStyle='#e08080';ctx.fill();
  for(let i=-1;i<=1;i+=2){ctx.beginPath();ctx.moveTo(38*s,i*3*s);ctx.lineTo(55*s,i*6*s);ctx.strokeStyle='rgba(100,60,20,0.5)';ctx.lineWidth=1;ctx.stroke();}
  ctx.beginPath();ctx.arc(38*s,4*s,5*s,0,Math.PI);ctx.strokeStyle='#7a3a0a';ctx.lineWidth=2;ctx.stroke();
  for(let i=-1;i<=1;i+=2){ctx.beginPath();ctx.ellipse(i*10*s,24*s,8*s,5*s,0,0,Math.PI*2);ctx.fillStyle=flash?'#ff9999':'#d4a888';ctx.fill();ctx.strokeStyle='#8a6a3a';ctx.lineWidth=1;ctx.stroke();}
  ctx.restore();
  let bw=b.r*3,bx=b.x-bw/2,by2=b.y-b.r-18;
  ctx.fillStyle='#333';ctx.fillRect(bx,by2,bw,8);
  let pct=b.hp/b.maxHp;
  ctx.fillStyle=pct>0.5?'#e25822':pct>0.25?'#e2a022':'#e22222';
  ctx.fillRect(bx,by2,bw*pct,8);
  ctx.strokeStyle='#666';ctx.lineWidth=1;ctx.strokeRect(bx,by2,bw,8);
  ctx.fillStyle='#fff';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
  ctx.fillText('BOSS MORČE',b.x,by2-4);ctx.textAlign='left';
}

function drawCarrot(p) {
  ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle+Math.PI/2);
  ctx.beginPath();ctx.moveTo(0,-p.r*1.4);ctx.lineTo(p.r*0.7,p.r*0.8);ctx.lineTo(-p.r*0.7,p.r*0.8);ctx.closePath();
  ctx.fillStyle='#ff7700';ctx.fill();ctx.strokeStyle='#cc4400';ctx.lineWidth=1;ctx.stroke();
  for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(i*p.r*0.3,p.r*0.8);ctx.quadraticCurveTo(i*p.r*0.8,p.r*1.8,i*p.r*0.4,p.r*2.2);ctx.strokeStyle='#44aa22';ctx.lineWidth=2;ctx.stroke();}
  ctx.restore();
}

function drawDrop(d) {
  let pulse=0.85+0.15*Math.sin(Date.now()/200);
  ctx.save();ctx.translate(d.x,d.y);
  ctx.globalAlpha=0.25*pulse*(d.life/600);
  ctx.beginPath();ctx.arc(0,0,d.r*2,0,Math.PI*2);ctx.fillStyle='#ffff00';ctx.fill();
  ctx.globalAlpha=1;
  ctx.beginPath();ctx.arc(0,0,d.r,0,Math.PI*2);ctx.fillStyle='#2a2a50';ctx.fill();
  ctx.strokeStyle='#ffdd00';ctx.lineWidth=2.5*pulse;ctx.stroke();
  ctx.fillStyle='#ffdd00';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(d.weapon.name,0,0);ctx.textBaseline='alphabetic';ctx.textAlign='left';
  ctx.fillStyle='#555';ctx.fillRect(-d.r,-d.r-8,d.r*2,4);
  ctx.fillStyle='#ffdd00';ctx.fillRect(-d.r,-d.r-8,d.r*2*(d.life/600),4);
  ctx.restore();
}

function draw() {
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#252540';ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  for(let sl of slime){
    ctx.globalAlpha=sl.life*0.5;ctx.beginPath();ctx.arc(sl.x,sl.y,sl.r,0,Math.PI*2);ctx.fillStyle='#7ec850';ctx.fill();
    ctx.globalAlpha=sl.life*0.2;ctx.beginPath();ctx.arc(sl.x-sl.r*0.25,sl.y-sl.r*0.25,sl.r*0.4,0,Math.PI*2);ctx.fillStyle='#ccff88';ctx.fill();
  }
  ctx.globalAlpha=1;

  for(let p of particles){
    if(p.textParticle){
      ctx.globalAlpha=Math.min(p.life,1);ctx.fillStyle='#ffff55';ctx.font='bold 20px sans-serif';ctx.textAlign='center';
      ctx.fillText(p.text,W/2,H/2-40);ctx.textAlign='left';
    }else{
      ctx.globalAlpha=p.life;ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();
    }
  }
  ctx.globalAlpha=1;

  // laser sight (mobile only)
  if(mobile) drawLaser();

  for(let b of bullets){
    if(b.laser){
      ctx.save();ctx.strokeStyle='#ff33ff';ctx.lineWidth=3;ctx.shadowColor='#ff33ff';ctx.shadowBlur=10;
      ctx.beginPath();ctx.moveTo(b.x-b.vx*4,b.y-b.vy*4);ctx.lineTo(b.x,b.y);ctx.stroke();
      ctx.strokeStyle='#ffaaff';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(b.x-b.vx*4,b.y-b.vy*4);ctx.lineTo(b.x,b.y);ctx.stroke();
      ctx.restore();
      ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    }else if(b.explode){
      ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle='#ff6633';ctx.fill();
      ctx.strokeStyle='#ffaa33';ctx.lineWidth=2;ctx.stroke();
    }else{
      ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle=b.color;ctx.fill();
      ctx.strokeStyle='rgba(255,165,0,0.5)';ctx.lineWidth=1;ctx.stroke();
    }
  }

  for(let p of bossProj)drawCarrot(p);
  for(let d of drops)drawDrop(d);
  for(let s of snails)drawSnail(s.x,s.y,s.r,s.hp,s.maxHp,s.angle,s.color);
  if(boss)drawBoss(boss);

  // player
  ctx.save();ctx.translate(player.x,player.y);ctx.rotate(player.angle);
  ctx.beginPath();ctx.arc(0,0,player.r,0,Math.PI*2);ctx.fillStyle='#3a7bd5';ctx.fill();ctx.strokeStyle='#6aaeff';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#888';ctx.fillRect(player.r-2,-4,16,8);
  ctx.fillStyle=getW().color;ctx.fillRect(player.r+8,-3,6,6);
  ctx.restore();

  // ammo bar
  let w=getW(),bx=10,by=H-28,bw=150,bh=12;
  ctx.fillStyle='#333';ctx.fillRect(bx,by,bw,bh);
  if(reloading){
    ctx.fillStyle='#e2a022';ctx.fillRect(bx,by,bw*(1-reloadTimer/w.reload),bh);
    ctx.fillStyle='#fff';ctx.font='11px sans-serif';ctx.fillText('Přebíjení...',bx+4,by+10);
  }else{
    ctx.fillStyle=w.color;ctx.fillRect(bx,by,bw*(ammo/w.ammo),bh);
    ctx.fillStyle='#fff';ctx.font='11px sans-serif';ctx.fillText(`${ammo}/${w.ammo}`,bx+4,by+10);
  }
  ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);

  // boss countdown
  if(!boss){
    let rem=nextBossIn-bossTimer,btw=120,btx=W-btw-10,bty=10;
    ctx.fillStyle='#333';ctx.fillRect(btx,bty,btw,8);
    ctx.fillStyle='#cc3300';ctx.fillRect(btx,bty,btw*(1-rem/nextBossIn),8);
    ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(btx,bty,btw,8);
    ctx.fillStyle='#ffaaaa';ctx.font='10px sans-serif';ctx.textAlign='right';
    ctx.fillText('Boss za: '+Math.ceil(rem/60)+'s',W-10,bty+20);ctx.textAlign='left';
  }

  // crosshair (PC only)
  if(!mobile){
    ctx.save();ctx.translate(mouse.x,mouse.y);ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-10,0);ctx.lineTo(-4,0);ctx.moveTo(4,0);ctx.lineTo(10,0);ctx.moveTo(0,-10);ctx.lineTo(0,-4);ctx.moveTo(0,4);ctx.lineTo(0,10);ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
}

function gameOver() {
  gameRunning=false;cancelAnimationFrame(animId);draw();
  overlay.innerHTML=`<h1>Konec hry!</h1><p>Skóre: <strong>${score}</strong></p><button id="startBtn">Hrát znovu</button>`;
  overlay.style.display='flex';
  document.getElementById('startBtn').addEventListener('click',init);
}

canvas.addEventListener('mousemove',e=>{let r=canvas.getBoundingClientRect();mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top;});
canvas.addEventListener('mousedown',e=>{if(e.button===0){mouseHeld=true;shootOnce=true;}});
canvas.addEventListener('mouseup',e=>{if(e.button===0)mouseHeld=false;});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{keys[e.key]=true;if(['w','s','a','d','W','S','A','D',' '].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
document.getElementById('startBtn').addEventListener('click',init);
</script>
</body>
</html>
